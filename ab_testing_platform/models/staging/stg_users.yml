version: 2

models:
  - name: stg_users
    description: Cleaned user dataset for A/B testing
    columns:
      - name: user_id
        tests:
          - not_null
          - unique

      - name: signup_date
        tests:
          - not_null

      - name: variant
        tests:
          - not_null
          - accepted_values:
              values: ['A', 'B']

      - name: converted
        tests:
          - not_null